<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang Nâng Cấp - Hệ Sinh Thái Học Tập</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Hiệu ứng nền */
        .ambient-bg {
            position: absolute; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.15), transparent 60%);
            animation: pulseBg 4s infinite alternate ease-in-out;
        }
        @keyframes pulseBg {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* Lưới công nghệ phía sau */
        .grid-bg {
            position: absolute; inset: 0; z-index: -2;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Box nội dung chính */
        .update-box {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Icon Radar / Gear quay */
        .icon-container {
            position: relative;
            width: 100px; height: 100px;
            margin: 0 auto 30px;
            display: flex; justify-content: center; align-items: center;
        }
        .icon-container i {
            font-size: 3.5rem;
            color: var(--primary);
            filter: drop-shadow(0 0 15px var(--primary-glow));
            z-index: 2;
        }
        .icon-ring {
            position: absolute; inset: 0;
            border: 3px dashed var(--primary);
            border-radius: 50%;
            animation: spin 8s linear infinite;
            opacity: 0.5;
        }
        .icon-ring-inner {
            position: absolute; inset: 15px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 3s linear infinite reverse;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Tiêu đề và text */
        .title {
            font-size: 2rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 15px;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .desc {
            color: var(--text-muted); font-size: 1rem; line-height: 1.6;
            margin-bottom: 30px;
        }
        .author {
            color: white; font-weight: 700;
        }

        /* Thanh Progress Bar giả lập */
        .progress-container {
            width: 100%; background: rgba(0,0,0,0.3);
            height: 8px; border-radius: 10px; margin-bottom: 15px;
            overflow: hidden; position: relative;
        }
        .progress-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 10px;
            animation: loading 5s ease-in-out infinite;
        }
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 100%; }
        }
        .progress-text {
            font-size: 0.85rem; color: var(--accent); font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* Nút liên hệ */
        .btn-contact {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 30px; padding: 14px 28px; width: 100%;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: white; text-decoration: none; border-radius: 100px;
            font-weight: 600; transition: 0.3s;
        }
        .btn-contact:hover {
            background: var(--primary); border-color: var(--primary);
            box-shadow: 0 10px 25px var(--primary-glow); transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div class="ambient-bg"></div>

    <div class="update-box">
        <div class="icon-container">
            <div class="icon-ring"></div>
            <div class="icon-ring-inner"></div>
            <i class="fa-solid fa-server"></i>
        </div>

        <h1 class="title">Đang Nâng Cấp</h1>
        <p class="desc">
            Hệ thống đang được bảo trì và cập nhật Source Code mới nhất. <br>
            Cảm ơn AE đã kiên nhẫn chờ đợi! <br>
            <span style="font-size: 0.9rem; margin-top: 10px; display: block;">— Dev: <span class="author">Lữ Chí Vỹ</span> —</span>
        </p>

        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <div class="progress-text">Updating Database...</div>

        <a href="https://www.facebook.com/tau.hu.758" target="_blank" class="btn-contact">
            <i class="fa-brands fa-facebook"></i> Liên hệ Admin
        </a>
    </div>

</body>
</html>
