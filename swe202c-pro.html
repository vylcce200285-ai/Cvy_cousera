<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Source VIP SWE202c - Chí Vỹ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #09090b;
            --primary: #8b5cf6; 
            --accent: #10b981; 
            --surface: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* GIAO DIỆN CHÍNH */
        .top-bar { padding: 15px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 10; }
        .btn-glass { background: var(--surface); backdrop-filter: blur(10px); border: 1px solid var(--border); color: #fff; padding: 8px 16px; border-radius: 100px; cursor: pointer; transition: 0.3s; text-decoration: none; font-weight: 600; }
        .btn-quiz.active { background: var(--primary); border-color: var(--primary); }

        .header-section { text-align: center; padding: 10px 20px; }
        .super-title { font-size: 1.5rem; font-weight: 900; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .gallery-container { max-width: 1400px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .img-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s; }
        .img-wrapper { width: 100%; height: 160px; overflow: hidden; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        .img-info { padding: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem;}

        /* MODAL VÀ CHIẾN THUẬT CẮT SÁT (HARD CUT) */
        .modal { position: fixed; inset: 0; z-index: 9999; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        
        .modal-content-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 1000px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        /* KHUNG CHỨA ẢNH - CHỈ HIỆN PHẦN CÂU HỎI */
        .img-hard-cut-box {
            position: relative;
            width: 90%;
            /* CHIỀU CAO CỐ ĐỊNH: Chỉ vừa đủ cho câu hỏi và 5 lựa chọn */
            height: 320px; 
            overflow: hidden; /* QUAN TRỌNG: Cắt bỏ hoàn toàn phần thừa */
            border-radius: 8px;
            background: #fff; /* Nền trắng cho ảnh đề */
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transition: height 0.3s ease; /* Hiệu ứng khi mở rộng */
        }

        .modal-img { 
            width: 100%;
            height: auto;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* KHI HIỆN ĐÁP ÁN (REVEAL) */
        /* Mở rộng chiều cao khung để hiện phần còn lại của ảnh */
        .reveal-answer .img-hard-cut-box { 
            height: auto; /* Tự động theo chiều cao ảnh */
            max-height: calc(100vh - 150px); /* Không vượt quá màn hình */
            overflow-y: auto; /* Cho phép cuộn nếu ảnh quá dài */
        }

        .modal-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: white; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; z-index: 20; font-size: 1.2rem; }
        .btn-prev { left: 15px; } .btn-next { right: 15px; }
        .btn-close { position: absolute; top: 15px; right: 15px; color: rgba(255,255,255,0.5); font-size: 2rem; background: none; border: none; cursor: pointer; z-index: 100; }
        .btn-close:hover { color: #fff; }

        .modal-footer { 
            margin-top: 15px;
            background: #111;
            border: 1px solid #222; 
            padding: 12px 25px; 
            border-radius: 100px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            z-index: 60;
        }
        
        .quiz-mode-controls { display: none; gap: 8px; }
        .btn-option { 
            width: 40px; height: 40px; border-radius: 50%; background: #1f1f23; 
            border: 1px solid #333; color: #fff; font-weight: 800; cursor: pointer;
        }
        .btn-option.correct { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-option.wrong { background: #ef4444; color: #fff; border-color: #ef4444; }

        @media (max-width: 768px) {
            .img-hard-cut-box { width: 95%; height: 260px; } /* Mobile cắt sát hơn */
            .modal-footer { width: 95%; flex-wrap: wrap; justify-content: center; border-radius: 20px; bottom: 10px; gap: 10px; padding: 10px;}
            .modal-btn { display: none; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="#" class="btn-glass"><i class="fa-solid fa-home"></i></a>
        <div class="top-actions">
            <button id="btnToggleQuiz" class="btn-glass btn-quiz"><i class="fa-solid fa-gamepad"></i> <span>Luyện Thi</span></button>
        </div>
    </div>

    <header class="header-section">
        <h1 class="super-title">SWE202c VIP HARD-CUT</h1>
    </header>

    <main class="gallery-container" id="galleryContainer"></main>

    <div class="modal" id="imageModal">
        <button class="btn-close" id="btnClose">&times;</button>
        
        <div class="modal-content-wrapper" id="modalContent">
            <button class="modal-btn btn-prev" id="btnPrev"><i class="fa-solid fa-chevron-left"></i></button>
            
            <div class="img-hard-cut-box">
                <img id="modalImg" class="modal-img" src="">
            </div>

            <button class="modal-btn btn-next" id="btnNext"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        
        <div class="modal-footer">
            <div id="modalCounter" style="font-weight: bold; font-size: 0.9rem;">1 / 215</div>
            
            <div class="quiz-mode-controls" id="quizModeControls">
                <button class="btn-option" data-opt="A">A</button>
                <button class="btn-option" data-opt="B">B</button>
                <button class="btn-option" data-opt="C">C</button>
                <button class="btn-option" data-opt="D">D</button>
                <button class="btn-option" data-opt="E">E</button>
            </div>
        </div>
    </div>

<script>
    const TOTAL_IMAGES = 215; 
    const IMAGE_FOLDER = "img-swe";
    const IMAGE_PREFIX = "swe";

    // Đáp án (Cập nhật đáp án thật vào đây)
    const RAW_ANSWERS = "C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D C B A D"; 
    const ANSWERS_ARRAY = RAW_ANSWERS.trim().split(/\s+/);

    document.addEventListener('DOMContentLoaded', () => {
        const gallery = document.getElementById('galleryContainer');
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        const modalContent = document.getElementById('modalContent');
        const btnToggleQuiz = document.getElementById('btnToggleQuiz');
        const quizModeControls = document.getElementById('quizModeControls');
        
        let currentIndex = 1;
        let isQuizMode = false;

        // Render Gallery
        for (let i = 1; i <= TOTAL_IMAGES; i++) {
            const card = document.createElement('div');
            card.className = 'img-card';
            card.innerHTML = `<div class="img-wrapper"><img src="${IMAGE_FOLDER}/${IMAGE_PREFIX} (${i}).jpg" loading="lazy"></div><div class="img-info"><span>Câu ${i}</span></div>`;
            card.onclick = () => openModal(i);
            gallery.appendChild(card);
        }

        // Toggle Luyện Thi
        btnToggleQuiz.onclick = () => {
            isQuizMode = !isQuizMode;
            btnToggleQuiz.classList.toggle('active', isQuizMode);
            quizModeControls.style.display = isQuizMode ? 'flex' : 'none';
        };

        function openModal(index) {
            currentIndex = index;
            modalImg.src = `${IMAGE_FOLDER}/${IMAGE_PREFIX} (${currentIndex}).jpg`;
            modalContent.classList.remove('reveal-answer'); // Luôn che khi mở câu mới
            resetOptions();
            document.getElementById('modalCounter').innerText = `${currentIndex} / ${TOTAL_IMAGES}`;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function resetOptions() {
            document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('correct', 'wrong'));
        }

        // Check đáp án
        document.querySelectorAll('.btn-option').forEach(btn => {
            btn.onclick = (e) => {
                const selected = e.target.dataset.opt;
                const correct = ANSWERS_ARRAY[currentIndex - 1];

                if (selected === correct) {
                    btn.classList.add('correct');
                    modalContent.classList.add('reveal-answer'); 
                } else {
                    btn.classList.add('wrong');
                    document.querySelector(`[data-opt="${correct}"]`).classList.add('correct');
                    modalContent.classList.add('reveal-answer'); 
                }
            };
        });

        document.getElementById('btnClose').onclick = () => { modal.classList.remove('active'); document.body.style.overflow = 'auto'; }
        document.getElementById('btnNext').onclick = () => openModal(currentIndex < TOTAL_IMAGES ? currentIndex + 1 : 1);
        document.getElementById('btnPrev').onclick = () => openModal(currentIndex > 1 ? currentIndex - 1 : TOTAL_IMAGES);
    });
</script>
</body>
</html>
