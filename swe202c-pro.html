<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Source VIP SWE202c - Chí Vỹ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #09090b;
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --accent: #10b981; 
            --surface: rgba(255, 255, 255, 0.03);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            /* Theme Classic Exam */
            --classic-bg: #ece9d8;
            --classic-border: #aca899;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; overflow-x: hidden; position: relative; }

        /* === TRANG CHỦ VIP DARK MODE === */
        .ambient-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 15% 0%, rgba(139, 92, 246, 0.15) 0%, transparent 40%), radial-gradient(circle at 85% 100%, rgba(109, 40, 217, 0.15) 0%, transparent 40%); filter: blur(40px); }

        .top-bar { padding: 20px; max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;}
        .top-actions { display: flex; gap: 15px; }
        
        .btn-glass { background: var(--surface); backdrop-filter: blur(12px); border: 1px solid var(--border); color: var(--text-main); padding: 10px 20px; border-radius: 100px; font-weight: 600; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 8px; transition: var(--transition); cursor: pointer; }
        .btn-glass:hover { background: var(--surface-hover); border-color: var(--primary); box-shadow: 0 4px 20px var(--primary-glow); }
        .btn-music.playing { background: rgba(16, 185, 129, 0.15); color: var(--accent); border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .btn-exam { background: linear-gradient(135deg, #ef4444, #b91c1c); border: none; color: white; }
        .btn-exam:hover { background: #dc2626; box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4); transform: translateY(-2px); }

        .header-section { text-align: center; padding: 20px 20px 40px; }
        .super-title { font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; text-transform: uppercase; letter-spacing: -1px; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .vip-badge { display: inline-block; background: linear-gradient(45deg, #8b5cf6, #d946ef); color: #fff; padding: 4px 12px; border-radius: 20px; font-weight: 900; font-size: 0.9rem; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }

        .progress-wrapper { max-width: 400px; margin: 20px auto 30px; text-align: left; }
        .progress-text { font-size: 0.95rem; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        .search-container { max-width: 400px; margin: 0 auto; position: relative; }
        .search-container i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input { width: 100%; padding: 16px 16px 16px 45px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        /* Khung Lưới Trang Chủ */
        .gallery-container { max-width: 1400px; margin: 0 auto; padding: 0 20px 60px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .img-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 25px 15px; cursor: pointer; transition: var(--transition); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); position: relative; overflow: hidden; min-height: 130px;}
        .img-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2); }
        .img-title { font-weight: 900; font-size: 1.5rem; color: var(--text-main); margin-bottom: 10px; }
        .img-badge { background: var(--primary); color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; z-index: 2; }
        
        .img-card.learned { border-color: var(--accent); background: rgba(16, 185, 129, 0.05); }
        .img-card.learned .img-badge { background: var(--accent); color: white; }
        .img-card.learned::after { content: '\f058'; font-family: 'Font Awesome 6 Free'; font-weight: 900; position: absolute; font-size: 6rem; color: rgba(16, 185, 129, 0.1); top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; pointer-events: none;}

        /* === MODAL HỌC THUỘC === */
        .modal { position: fixed; inset: 0; z-index: 9999; background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; }
        .modal.active { opacity: 1; visibility: visible; }
        
        .btn-close { position: absolute; top: 20px; right: 20px; background: rgba(244, 63, 94, 0.1); color: #f43f5e; border: 1px solid rgba(244, 63, 94, 0.3); width: 48px; height: 48px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; transition: var(--transition); z-index: 100; }
        .btn-close:hover { background: #f43f5e; color: white; transform: rotate(90deg); }

        .modal-body { display: flex; align-items: center; justify-content: center; gap: 20px; width: 100%; max-width: 1000px; padding: 0 20px; margin-bottom: 60px; }
        .modal-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; width: 56px; height: 56px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; transition: var(--transition); flex-shrink: 0; display: flex; align-items: center; justify-content: center;}
        .modal-btn:hover { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); transform: scale(1.1);}

        /* Style Giao Diện Nền Trắng Cho Khung Học */
        .question-container {
            flex: 1;
            background: #ffffff; 
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 35px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            max-height: 75vh;
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .question-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 25px; line-height: 1.6; color: #0f172a; }
        
        .options-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .option-btn {
            width: 100%; text-align: left; padding: 18px 20px; 
            background: #f8fafc; 
            border: 1px solid #cbd5e1; 
            border-radius: 12px; 
            color: #334155; 
            font-size: 1rem; font-family: inherit; font-weight: 600; 
            cursor: pointer; /* Cho phép click lại */
            line-height: 1.5;
            transition: all 0.2s ease;
        }
        .option-btn:hover { background: #f1f5f9; border-color: #94a3b8; }
        .option-btn.selected { background: rgba(139, 92, 246, 0.1); border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }

        /* THANH REVEAL ANSWER */
        .reveal-btn {
            width: 100%;
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            color: #475569;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .reveal-btn:hover { background: #e2e8f0; border-color: #94a3b8; color: #1e293b;}
        
        /* HIỂN THỊ ĐÁP ÁN ĐÚNG Ở DƯỚI CÙNG */
        .correct-answer-box {
            background: #ecfdf5;
            border-left: 6px solid #10b981;
            border-radius: 8px;
            padding: 18px 20px;
            color: #065f46;
            font-size: 1.1rem;
            line-height: 1.6;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.1);
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Footer Pill */
        .footer-pill { position: absolute; bottom: 30px; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); padding: 10px 25px; border-radius: 100px; display: flex; align-items: center; gap: 20px; z-index: 60; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .modal-counter { color: var(--text-muted); font-weight: 600; font-size: 1rem; }
        .action-controls { display: flex; gap: 10px; }
        .btn-mark { padding: 8px 16px; font-size: 0.9rem; background: rgba(255,255,255,0.05); border: 1px solid transparent; color: white; border-radius: 100px; font-weight: 600; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 8px;}
        .btn-mark:hover { background: rgba(255,255,255,0.15); }
        .btn-mark.active { background: rgba(16, 185, 129, 0.2); color: var(--accent); border-color: var(--accent); }

        /* === CHẾ ĐỘ THI THỬ (CLASSIC EOS/PE) === */
        #classicExamContainer { 
            display: none; position: fixed; inset: 0; background: var(--classic-bg); z-index: 9999; 
            font-family: Tahoma, Arial, sans-serif; flex-direction: column; padding: 10px; color: #000;
        }
        .btn-exit-exam { position: absolute; top: 10px; right: 20px; padding: 5px 15px; cursor: pointer; background: #fff; border: 1px solid #999; border-radius: 3px; font-size: 12px;}
        
        .classic-tabs { display: flex; border-bottom: 1px solid var(--classic-border); padding-left: 10px; margin-top: 30px;}
        .classic-tab { background: #fff; border: 1px solid var(--classic-border); border-bottom: none; padding: 5px 15px; font-size: 13px; margin-bottom: -1px; border-top-left-radius: 3px; border-top-right-radius: 3px; }

        .classic-main { display: flex; border: 1px solid var(--classic-border); background: #fff; height: calc(100vh - 200px); min-height: 400px;}
        
        .classic-sidebar { width: 120px; background: #f5f5f5; border-right: 1px solid var(--classic-border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        .classic-ans-title { font-weight: bold; color: darkblue; margin-bottom: 15px; font-size: 14px;}
        .classic-options-list { display: flex; flex-direction: column; gap: 15px; width: 100%; padding-left: 30px;}
        .classic-opt-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;}
        .classic-opt-item input { cursor: pointer; }
        .classic-next-btn { margin-top: auto; padding: 5px 20px; border: 1px solid #999; background: #e0e0e0; cursor: pointer; border-radius: 3px; margin-bottom: 20px;}
        .classic-next-btn:active { background: #ccc; }

        .classic-content { flex: 1; padding: 15px; display: flex; flex-direction: column; }
        .classic-q-header { font-weight: bold; color: darkblue; font-size: 14px; margin-bottom: 10px; }
        .classic-q-box { flex: 1; border: 2px inset #ddd; padding: 15px; overflow-y: auto; font-size: 14px; line-height: 1.6; }
        .classic-q-text { margin-bottom: 20px; white-space: pre-wrap;}
        .classic-q-answers { margin-top: 10px; }

        .classic-footer { margin-top: 10px; border: 1px solid var(--classic-border); padding: 10px; background: #f5f5f5; }
        .classic-grid { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 15px; }
        .grid-btn { width: 30px; height: 25px; border: 1px solid #999; background: #fff; font-size: 12px; cursor: pointer; color: #000; }
        .grid-btn.answered { background: #d0d0d0; }
        .grid-btn.active { border: 2px solid darkblue; font-weight: bold; background: #e8f0fe;}
        
        .classic-bottom-actions { display: flex; flex-direction: column; gap: 5px; }
        .finish-checkbox { font-size: 13px; color: darkblue; display: flex; align-items: center; gap: 5px;}
        .classic-finish-btn { width: 80px; padding: 5px; background: lightgoldenrodyellow; border: 1px solid #999; cursor: pointer;}
        .classic-finish-btn:disabled { background: #eee; color: #999; cursor: not-allowed;}

        /* Kết quả Overlay */
        .result-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(5px);}
        .result-box { background: white; padding: 40px; border-radius: 12px; text-align: center; color: #333; }
        .result-score { font-size: 3rem; font-weight: bold; color: var(--primary); margin: 20px 0; }
        .btn-close-result { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: bold;}

        /* Responsive Scrollbar */
        .question-container::-webkit-scrollbar, .classic-q-box::-webkit-scrollbar { width: 8px; }
        .question-container::-webkit-scrollbar-track, .classic-q-box::-webkit-scrollbar-track { background: transparent; }
        .question-container::-webkit-scrollbar-thumb, .classic-q-box::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.5); border-radius: 10px; }

        @media (max-width: 768px) {
            .top-bar { flex-direction: column; gap: 15px; text-align: center; }
            .modal-btn { display: none; }
            .modal-body { padding: 0 15px; margin-bottom: 80px;}
            .question-container { padding: 20px; }
            .footer-pill { bottom: 15px; flex-wrap: wrap; border-radius: 20px; gap: 15px; width: 90%; justify-content: space-between;}
            .classic-sidebar { width: 60px; }
            .classic-opt-item { flex-direction: column; gap: 2px;}
            .classic-opt-item input { margin: 0;}
        }
    </style>
</head>
<body>
    <div class="ambient-bg" id="ambientBg"></div>
    <div id="youtubePlayer" style="display: none;"></div>

    <div id="mainContainer">
        <div class="top-bar">
            <a href="#" class="btn-glass"><i class="fa-solid fa-arrow-left"></i> Về trang chủ</a>
            <div class="top-actions">
                <button id="btnExamMode" class="btn-glass btn-exam"><i class="fa-solid fa-file-signature"></i> <span>THI THỬ (EOS)</span></button>
                <button id="btnMusic" class="btn-glass btn-music"><i class="fa-solid fa-music"></i> <span>Lo-Fi: TẮT</span></button>
            </div>
        </div>

        <header class="header-section">
            <div class="vip-badge"><i class="fa-brands fa-java"></i> GÓI VIP SWE202c (FULL CHỨC NĂNG)</div>
            <h1 class="super-title">KHO TÀI LIỆU SWE202C</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Coded by <b style="color: white;">Lữ Chí Vỹ</b></p>
            
            <div class="progress-wrapper">
                <div class="progress-text"><span>Tiến độ hoàn thành:</span><span id="progressPercent">0%</span></div>

            </div>
        </header>

        <main class="gallery-container" id="galleryContainer"></main>
    </div>

    <div class="modal" id="studyModal">
        <button class="btn-close" id="btnCloseStudy"><i class="fa-solid fa-xmark"></i></button>
        
        <div class="modal-body" id="swipeArea">
            <button class="modal-btn btn-prev" id="btnPrev"><i class="fa-solid fa-chevron-left"></i></button>
            
            <div class="question-container" id="questionBox">
                <div class="question-text" id="qText"></div>

        <div class="footer-pill">

            <div class="action-controls">
                <button class="btn-mark" id="btnMarkLearned"><i class="fa-solid fa-check"></i> <span>Đã hiểu</span></button>
            </div>
        </div>
    </div>

    <div id="classicExamContainer">
        <button class="btn-exit-exam" id="btnExitExam">Thoát Luyện Thi</button>
        
        <div class="classic-tabs"><div class="classic-tab">Multiple Choices</div></div>
        
        <div class="classic-main">
            <div class="classic-sidebar">

            <div class="classic-content">
                <div class="classic-q-header">Multiple choices <span id="classicCounter"></span></div>
                <div class="classic-q-box">

                    <div class="classic-q-answers" id="classicQOptions"></div>

        <div class="classic-footer">

                <button class="classic-finish-btn" id="btnFinishExam" disabled>Finish</button>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <h2>Hoàn Thành Bài Thi</h2>
            <div class="result-score" id="finalScore">0 / 50</div>

            <button class="btn-close-result" id="btnCloseResult">Xong</button>
        </div>
    </div>

<script>
    // BẠN DÁN TOÀN BỘ DATA SUỘC CỦA BẠN VÀO ĐÂY NHƯ BÌNH THƯỜNG
    const rawData = `
Question 1: How do developers interact with Generative Al tools? Select all that apply.
A. Letting the Al infer tasks without direction.
B. Providing detailed context for complex tasks.
C. Using simple queries for basic outputs.
D. Refining prompts to improve Al output.

Question 7: How does Generative Al contribute to effective code reviews? Select all that apply.

Question 8: How does Al assist in improving code reviews?

Question 13: True or False. Neural networks are composed of layers, including input, hidden, and output layers, where neurons in each layer are connected to neurons in the next layer.

B. True
B. True


Question 14: A retail company wants to adopt digital transformation technologies. It is considering using Al for personalized recommendations, IoT devices for real-time inventory tracking, and cloud platforms for data management. Which benefits are these technologies likely to provide?

Question 16: Which of the following is a characteristic of a neural network?
A. Composed of hidden and output layers.
B. Composed of input and output layers.

    function extractKey(text) {
        let clean = text.replace(/\]+\]/g, "").trim();
        const match = clean.match(/^([A-Z])\./i);
        if (match) return match[1].toUpperCase();
        return clean.toLowerCase().replace(/\.$/, "");

    function parseQuestions(text) {
        // Tẩy sạch cite trước khi xử lý
        const cleanText = text.replace(/\]+\]/g, "");
        const blocks = cleanText.split(/Question \d+:/).filter(b => b.trim() !== '');
        
        return blocks.map((block, index) => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l !== '');
            const qText = lines.shift();

            if(options.length === 0) {
                 options = [answerString.trim()];
            }

            return { id: index + 1, question: qText, options, answers: correctAnswers };
        });

        let userAnswers = {}; 

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        var player; let isPlaying = false;
        window.onYouTubeIframeAPIReady = function() {
            player = new YT.Player('youtubePlayer', { 
                height: '0', width: '0', videoId: 'v-92I1wtJV4',
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'v-92I1wtJV4', 'start': 765 }
            });
        }
        document.getElementById('btnMusic').addEventListener('click', function() {
            if (!player || !player.playVideo) return alert("Đang tải nhạc, chờ xíu!");
            if (isPlaying) { player.pauseVideo(); this.innerHTML = '<i class="fa-solid fa-music"></i> <span>Lo-Fi: TẮT</span>'; this.classList.remove('playing'); } 
            else { player.playVideo(); this.innerHTML = '<i class="fa-solid fa-headphones"></i> <span>Đang Chill...</span>'; this.classList.add('playing'); }
            isPlaying = !isPlaying;
        });

        function updateProgress() {
            const count = learnedItems.size; const percent = ((count / TOTAL_QUESTIONS) * 100).toFixed(1);
            progressPercent.textContent = `${count}/${TOTAL_QUESTIONS} (${percent}%)`; progressFill.style.width = `${percent}%`;
        }

        const fragment = document.createDocumentFragment();
        quizData.forEach((q, index) => {
            const i = index + 1;
            const card = document.createElement('div');
            card.className = `img-card ${learnedItems.has(i) ? 'learned' : ''}`;
            card.dataset.index = i;
            let previewText = q.question.length > 50 ? q.question.substring(0, 50) + "..." : q.question;
            card.innerHTML = `
                <div class="img-title">Câu ${i}</div>
                <div style="font-size: 0.9rem; color: var(--text-muted); text-align: center; margin-bottom: 10px;">${previewText}</div>
                <span class="img-badge">${learnedItems.has(i) ? 'Đã học' : 'VIP'}</span>
            `;
            card.addEventListener('click', () => openStudyModal(i));
            fragment.appendChild(card);
        });
        gallery.appendChild(fragment); 
        updateProgress();

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.trim();
            document.querySelectorAll('.img-card').forEach(card => card.style.display = (val === '' || card.dataset.index === val) ? 'flex' : 'none');
        });

        function openStudyModal(index) {
            currentIndex = index;
            updateStudyModal();
            studyModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeStudyModal() {
            studyModal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function updateStudyModal() {
            const q = quizData[currentIndex - 1];
            qTextEl.textContent = `Câu ${currentIndex}: ${q.question}`;
            modalCounter.textContent = `Câu ${currentIndex} / ${TOTAL_QUESTIONS}`;
            updateMarkButtonUI();

            qOptionsEl.innerHTML = '';
            let correctTexts = [];

            q.options.forEach(optText => {
                const btn = document.createElement('div');
                btn.className = 'option-btn';
                btn.textContent = optText;
                
                // NÚT BẤM CHO PHÉP CLICK CHỌN
                btn.addEventListener('click', () => {
                    btn.classList.toggle('selected');
                });

                qOptionsEl.appendChild(btn);
                
                const optKey = extractKey(optText);
                if(q.answers.includes(optKey)) {
                    correctTexts.push(optText);
                }
            });

            // SETUP THANH REVEAL ĐÁP ÁN
            btnRevealAnswer.style.display = 'block';
            qCorrectAnswerEl.style.display = 'none';
            
            let ansHtml = correctTexts.length > 0 ? correctTexts.join('<br><br>') : q.answers.join(' | ');
            qCorrectAnswerEl.innerHTML = `
                <div style="margin-bottom: 8px;"><i class="fa-solid fa-circle-check"></i> <b style="font-size: 1.15rem;">ĐÁP ÁN ĐÚNG:</b></div>
                <div style="margin-left: 22px;">${ansHtml}</div>
            `;
        }

        // SỰ KIỆN CLICK ĐỂ HIỆN ĐÁP ÁN
        btnRevealAnswer.addEventListener('click', () => {
            btnRevealAnswer.style.display = 'none';
            qCorrectAnswerEl.style.display = 'block';
            
            // Đánh dấu câu đã học sau khi xem đáp án
            if (!learnedItems.has(currentIndex)) { 
                learnedItems.add(currentIndex); 
                localStorage.setItem(STORAGE_KEY, JSON.stringify([...learnedItems])); 
                updateProgress(); 
                document.querySelector(`.img-card[data-index="${currentIndex}"]`).classList.add('learned'); 
                document.querySelector(`.img-card[data-index="${currentIndex}"] .img-badge`).textContent = 'Đã học'; 
                updateMarkButtonUI();
            }
        });

        function prevQuestion() { currentIndex = currentIndex > 1 ? currentIndex - 1 : TOTAL_QUESTIONS; updateStudyModal(); }
        function nextQuestion() { currentIndex = currentIndex < TOTAL_QUESTIONS ? currentIndex + 1 : 1; updateStudyModal(); }

        document.getElementById('btnCloseStudy').addEventListener('click', closeStudyModal);
        document.getElementById('btnPrev').addEventListener('click', prevQuestion);
        document.getElementById('btnNext').addEventListener('click', nextQuestion);

        // PHÍM MŨI TÊN CHUYỂN CÂU VÀ PHÍM SPACE ĐỂ HIỆN ĐÁP ÁN NHANH
        document.addEventListener('keydown', e => {
            if (studyModal.classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevQuestion();
                if (e.key === 'ArrowRight') nextQuestion();
                if (e.key === 'Escape') closeStudyModal();
                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault(); // Ngăn cuộn trang
                    if(btnRevealAnswer.style.display === 'block') {
                        btnRevealAnswer.click();
                    } else {
                        nextQuestion(); // Ấn Space thêm lần nữa sẽ qua câu tiếp theo
                    }
                }
            }
        });

        btnMarkLearned.addEventListener('click', () => {
            const card = document.querySelector(`.img-card[data-index="${currentIndex}"]`); 
            const badge = card.querySelector('.img-badge');
            if (learnedItems.has(currentIndex)) { learnedItems.delete(currentIndex); card.classList.remove('learned'); badge.textContent = 'VIP'; } 
            else { learnedItems.add(currentIndex); card.classList.add('learned'); badge.textContent = 'Đã học'; }
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...learnedItems])); updateMarkButtonUI(); updateProgress();
        });

        function updateMarkButtonUI() {
            if (learnedItems.has(currentIndex)) { btnMarkLearned.classList.add('active'); btnMarkLearned.innerHTML = `<i class="fa-solid fa-check-double"></i> <span>Hoàn thành</span>`; } 
            else { btnMarkLearned.classList.remove('active'); btnMarkLearned.innerHTML = `<i class="fa-solid fa-check"></i> <span>Đã hiểu</span>`; }
        }

        let touchstartX = 0;
        document.getElementById('swipeArea').addEventListener('touchstart', e => { touchstartX = e.touches[0].clientX; }, {passive: true});
        document.getElementById('swipeArea').addEventListener('touchend', e => { 
            let touchendX = e.changedTouches[0].clientX; 
            if(touchendX < touchstartX - 60) nextQuestion(); 
            if(touchendX > touchstartX + 60) prevQuestion(); 
        }, {passive: true});

        // === THI THỬ (CLASSIC EOS) ===
        const btnExamMode = document.getElementById('btnExamMode');
        const btnExitExam = document.getElementById('btnExitExam');
        
        btnExamMode.addEventListener('click', () => {
            if(confirm(`Hệ thống sẽ lấy ngẫu nhiên tối đa 50 câu. Bắt đầu?`)) {
                mainContainer.style.display = 'none';
                classicExamContainer.style.display = 'flex';
                document.getElementById('ambientBg').style.display = 'none';
                
                let maxQ = TOTAL_QUESTIONS < 50 ? TOTAL_QUESTIONS : 50;
                let arr = Array.from({length: TOTAL_QUESTIONS}, (_, i) => i).sort(() => Math.random() - 0.5);
                examSequence = arr.slice(0, maxQ);
                currentExamStep = 0;
                userAnswers = {};
                
                document.getElementById('checkFinish').checked = false;
                document.getElementById('btnFinishExam').disabled = true;

                renderClassicGrid();
                loadClassicQuestion(0);
            }
        });

        btnExitExam.addEventListener('click', () => {
            if(Object.keys(userAnswers).length > 0 && !confirm("Đang làm bài, thoát sẽ mất dữ liệu?")) return;
            classicExamContainer.style.display = 'none';
            mainContainer.style.display = 'block';
            document.getElementById('ambientBg').style.display = 'block';
        });

        function renderClassicGrid() {
            const grid = document.getElementById('classicGrid');
            grid.innerHTML = '';
            examSequence.forEach((_, i) => {
                const btn = document.createElement('button');
                btn.className = 'grid-btn';
                btn.textContent = i + 1;
                btn.addEventListener('click', () => loadClassicQuestion(i));
                grid.appendChild(btn);
            });
        }

        function loadClassicQuestion(index) {
            currentExamStep = index;
            const qIndexData = examSequence[index];
            const q = quizData[qIndexData];
            
            document.getElementById('classicCounter').textContent = `${index + 1}/${examSequence.length}`;
            
            document.querySelectorAll('.grid-btn').forEach((btn, i) => {
                btn.classList.remove('active');
                if (i === index) btn.classList.add('active');
                if (userAnswers[q.id] && userAnswers[q.id].length > 0) btn.classList.add('answered');
                else btn.classList.remove('answered');
            });

            document.getElementById('classicQText').innerHTML = `Consider the following question:<br><br><b>${q.question}</b>`;
            
            let rightHtml = '';
            q.options.forEach(opt => { rightHtml += `<div style="margin-bottom:8px;">${opt}</div>`; });
            document.getElementById('classicQOptions').innerHTML = rightHtml;

            const checkboxContainer = document.getElementById('classicOptCheckboxes');
            checkboxContainer.innerHTML = '';
            const labels = ['A', 'B', 'C', 'D', 'E', 'F'];
            const isMultiple = q.answers.length > 1;

            q.options.forEach((opt, i) => {
                const optKey = extractKey(opt);
                const lbl = document.createElement('label');
                lbl.className = 'classic-opt-item';
                
                const inp = document.createElement('input');
                inp.type = isMultiple ? 'checkbox' : 'radio';
                inp.name = `exam_opt_${q.id}`;
                if (userAnswers[q.id] && userAnswers[q.id].includes(optKey)) inp.checked = true;

                inp.addEventListener('change', (e) => {
                    if (!userAnswers[q.id]) userAnswers[q.id] = [];
                    if (!isMultiple) {
                        userAnswers[q.id] = [optKey];
                    } else {
                        if(e.target.checked) userAnswers[q.id].push(optKey);
                        else userAnswers[q.id] = userAnswers[q.id].filter(v => v !== optKey);
                    }
                    const gridBtn = document.getElementById('classicGrid').children[index];
                    if (userAnswers[q.id].length > 0) gridBtn.classList.add('answered');
                    else gridBtn.classList.remove('answered');
                });

                lbl.appendChild(inp);
                lbl.appendChild(document.createTextNode(labels[i] || '*'));
                checkboxContainer.appendChild(lbl);
            });
        }

        document.getElementById('classicNextBtn').addEventListener('click', () => {
            if (currentExamStep < examSequence.length - 1) loadClassicQuestion(currentExamStep + 1);
        });

        document.getElementById('checkFinish').addEventListener('change', (e) => {
            document.getElementById('btnFinishExam').disabled = !e.target.checked;
        });

        document.getElementById('btnFinishExam').addEventListener('click', () => {
            let score = 0; let totalQ = examSequence.length;
            for (let i = 0; i < totalQ; i++) {
                let qData = quizData[examSequence[i]];
                let userAns = userAnswers[qData.id] || [];
                let correctAns = qData.answers;
                if (userAns.length === correctAns.length && correctAns.every(v => userAns.includes(v))) {
                    score++;
                }
            }
            document.getElementById('finalScore').textContent = `${score} / ${totalQ}`;
            document.getElementById('finalPoint').textContent = ((score / totalQ) * 10).toFixed(1);
            document.getElementById('resultOverlay').style.display = 'flex';
        });

        document.getElementById('btnCloseResult').addEventListener('click', () => {
            document.getElementById('resultOverlay').style.display = 'none';
            btnExitExam.click(); 
        });
    });
</script>
</body>
</html>
