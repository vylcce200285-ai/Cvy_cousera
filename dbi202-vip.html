<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Sinh Thái Học Tập VIP - Lữ Chí Vỹ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS BIẾN - TÔNG MÀU HOÀNG GIA --- */
        :root {
            --bg-base: #050505;
            --bg-surface: rgba(20, 20, 22, 0.75);
            --primary: #d4af37;
            --primary-hover: #f3e5ab;
            --primary-glow: rgba(212, 175, 55, 0.25);
            --accent: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(212, 175, 55, 0.15);
            --radius-lg: 24px;
            --radius-md: 12px;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh; display: flex; flex-direction: column;
            overflow-x: hidden; position: relative;
        }

        .ambient-bg {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 15% 0%, rgba(212, 175, 55, 0.08), transparent 40%),
                        radial-gradient(circle at 85% 100%, rgba(226, 232, 240, 0.05), transparent 40%);
            filter: blur(60px); animation: pulseBg 10s infinite alternate;
        }
        @keyframes pulseBg { 0% { opacity: 0.6; } 100% { opacity: 1; } }

        .bg-grid {
            position: fixed; inset: 0; z-index: -1; opacity: 0.15;
            background-image: linear-gradient(var(--glass-border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }

        /* --- TOP BAR --- */
        .top-bar { 
            padding: 20px 30px; max-width: 1300px; margin: 0 auto; width: 100%;
            display: flex; align-items: center; justify-content: space-between; z-index: 10;
        }
        .top-actions { display: flex; gap: 15px; }

        .btn-glass { 
            color: var(--text-main); text-decoration: none; font-weight: 600; 
            display: inline-flex; align-items: center; gap: 8px; 
            padding: 10px 20px; border-radius: 100px;
            background: var(--bg-surface); border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px); transition: var(--transition); cursor: pointer;
        }
        .btn-glass:hover { background: var(--primary); border-color: var(--primary); color: #000; transform: translateY(-2px); box-shadow: 0 4px 15px var(--primary-glow); }

        .btn-music.playing { background: rgba(16, 185, 129, 0.15); color: var(--accent); border-color: rgba(16, 185, 129, 0.4); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .btn-quiz.active { background: rgba(212, 175, 55, 0.2); color: var(--primary); border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
        
        .btn-exam { background: linear-gradient(135deg, #ef4444, #b91c1c); border: none; color: white; }
        .btn-exam:hover { background: #dc2626; box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4); color: white; }

        /* --- HEADER & DASHBOARD --- */
        .header-section { max-width: 900px; margin: 0 auto; padding: 20px 24px 50px; text-align: center; z-index: 10; }
        .course-badge { display: inline-block; background: linear-gradient(135deg, var(--primary), #fff); color: #000; padding: 6px 20px; border-radius: 100px; font-weight: 800; font-size: 0.85rem; margin-bottom: 20px; box-shadow: 0 4px 15px var(--primary-glow); }
        .title { font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 900; color: #fff; margin-bottom: 10px; text-transform: uppercase; }
        .subtitle { color: var(--text-muted); font-size: 1.1rem; }

        .dashboard { background: var(--bg-surface); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 30px; margin-top: 40px; text-align: left; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .progress-title { font-weight: 600; font-size: 1.1rem; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .progress-stat { font-weight: 800; color: var(--primary); font-size: 1.2rem; }
        
        .progress-track { width: 100%; height: 10px; background: rgba(0, 0, 0, 0.4); border-radius: 999px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-hover)); width: 0%; transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1); box-shadow: 0 0 10px var(--primary-glow); }

        .search-box { margin-top: 25px; position: relative; }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-input { width: 100%; padding: 18px 20px 18px 55px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); color: var(--text-main); font-size: 1rem; outline: none; transition: var(--transition); }
        .search-input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }

        /* --- GALLERY --- */
        .gallery-container { max-width: 1300px; margin: 0 auto; padding: 0 24px 80px; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; z-index: 10; }
        .img-card { background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: var(--radius-md); overflow: hidden; cursor: pointer; transition: var(--transition); display: flex; flex-direction: column; opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s ease forwards; position: relative; }
        .img-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.4), 0 0 15px var(--primary-glow); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .img-wrapper { width: 100%; aspect-ratio: 4/3; background: #000; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.4s; }
        .img-card img.loaded { opacity: 0.85; }
        .img-card:hover img { opacity: 1; transform: scale(1.05); }

        .img-info { padding: 18px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        .img-title { font-weight: 700; font-size: 1.05rem; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; padding: 6px 12px; border-radius: 100px; background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }
        
        .img-card.learned { border-color: var(--accent); }
        .img-card.learned .status-badge { background: rgba(16, 185, 129, 0.15); color: var(--accent); }
        .learned-overlay { position: absolute; top: 15px; right: 15px; width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: white; display: flex; justify-content: center; align-items: center; opacity: 0; transition: 0.3s ease; z-index: 5; font-size: 1.1rem; }
        .img-card.learned .learned-overlay { opacity: 1; transform: scale(1) rotate(360deg); }

        /* --- MODAL --- */
        .modal { position: fixed; inset: 0; z-index: 9999; background: rgba(5, 5, 10, 0.95); backdrop-filter: blur(20px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.4s; }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content { position: relative; width: 100%; max-width: 1200px; height: 85vh; display: flex; align-items: center; justify-content: center; }
        
        .modal-img { max-width: 100%; max-height: 100%; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); object-fit: contain; transition: 0.3s; }
        
        /* PHÉP THUẬT: Cắt ảnh khi bật Luyện Thi hoặc Thi Thử */
        body.quiz-mode-active .modal-img { clip-path: inset(0 0 15% 0); }

        .modal-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main); width: 56px; height: 56px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; transition: var(--transition); z-index: 10; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-btn:hover { background: var(--primary); border-color: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary-glow); scale: 1.1; }
        .btn-prev { left: -80px; } .btn-next { right: -80px; }
        .btn-close { position: absolute; top: 25px; right: 30px; background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); width: 48px; height: 48px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; z-index: 100; transition: 0.3s; }
        .btn-close:hover { background: var(--danger); border-color: var(--danger); color: white; transform: rotate(90deg); }

        /* Footer Controls */
        .modal-footer { position: absolute; bottom: 20px; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 700px; background: rgba(20,20,25,0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); padding: 15px 30px; border-radius: 100px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }
        .modal-counter { color: var(--primary); font-weight: 700; font-size: 1.1rem; letter-spacing: 1px; min-width: 140px; }
        
        .normal-mode-controls { display: flex; flex: 1; justify-content: flex-end; }
        .btn-mark { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main); padding: 12px 24px; border-radius: 100px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-mark:hover { background: rgba(255,255,255,0.1); }
        .btn-mark.active { background: var(--accent); border-color: var(--accent); color: #000; box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }

        .quiz-mode-controls { display: none; flex: 1; justify-content: flex-end; gap: 12px; align-items: center; }
        .btn-option { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn-option:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); color: var(--primary); transform: scale(1.1); }
        
        /* Trạng thái nút bấm */
        .btn-option.correct { background: var(--accent); border-color: var(--accent); color: #000; box-shadow: 0 0 20px rgba(16, 185, 129, 0.6); transform: scale(1.1); }
        .btn-option.wrong { background: var(--danger); border-color: var(--danger); color: #fff; box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); }
        
        /* Trạng thái chọn trong lúc Thi Thử (không báo đúng sai ngay) */
        .btn-option.selected { background: var(--primary); border-color: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary-glow); transform: scale(1.1); }

        .btn-submit { display: none; background: var(--accent); color: #000; font-weight: 700; padding: 10px 20px; border-radius: 100px; border: none; cursor: pointer; margin-left: 15px; }
        .btn-submit:hover { box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); }

        /* Bảng Kết Quả Thi */
        .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .result-box { background: var(--bg-surface); padding: 50px; border-radius: var(--radius-lg); border: 2px solid var(--primary); text-align: center; box-shadow: 0 0 50px var(--primary-glow); animation: scaleUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes scaleUp { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .result-title { font-size: 2rem; color: var(--primary); margin-bottom: 20px; font-weight: 900; text-transform: uppercase; }
        .result-score { font-size: 4rem; color: #fff; font-weight: 900; margin-bottom: 10px; }
        .result-detail { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 30px; }
        .result-mark { font-size: 1.5rem; color: var(--accent); font-weight: 700; display: block; margin-top: 10px; }

        @media (max-width: 1300px) { .btn-prev { left: 20px; } .btn-next { right: 20px; } }
        @media (max-width: 768px) {
            .top-bar { flex-direction: column; gap: 15px; } .top-actions { justify-content: center; flex-wrap: wrap; }
            .modal-btn { display: none; }
            .modal-footer { bottom: 0; max-width: 100%; border-radius: 0; flex-direction: column; gap: 15px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
            .normal-mode-controls, .quiz-mode-controls { justify-content: center; }
            .result-box { width: 90%; padding: 30px; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div class="bg-grid"></div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <h2 class="result-title">Hoàn Thành Bài Thi</h2>
            <div class="result-score" id="scoreText">45/50</div>
            <div class="result-detail">Số câu trả lời đúng <br> <span class="result-mark" id="pointText">Điểm: 9.0</span></div>
            <button class="btn-glass" id="btnCloseResult"><i class="fa-solid fa-rotate-right"></i> Làm Đề Khác</button>
            <button class="btn-glass" id="btnExitResult" style="margin-top: 10px;"><i class="fa-solid fa-xmark"></i> Thoát</button>
        </div>
    </div>

    <div id="youtubePlayer" style="display: none;"></div>

    <div class="top-bar">
        <a href="index.html" class="btn-glass"><i class="fa-solid fa-arrow-left"></i> Về trang chủ</a>
        <div class="top-actions">
            <button id="btnExamMode" class="btn-glass btn-exam">
                <i class="fa-solid fa-file-signature"></i> <span>Thi Thử (50 Câu)</span>
            </button>
            <button id="btnToggleQuiz" class="btn-glass btn-quiz">
                <i class="fa-solid fa-gamepad"></i> <span>Luyện Thi: TẮT</span>
            </button>
            <button id="btnMusic" class="btn-glass btn-music">
                <i class="fa-solid fa-music"></i> <span>Lo-Fi: TẮT</span>
            </button>
        </div>
    </div>

    <header class="header-section">
        <div class="course-badge"><i class="fa-solid fa-database"></i> Source : DBI202</div>
        <h1 class="title">Kho Ngân Hàng Câu Hỏi</h1>
        <p class="subtitle">Hệ thống trắc nghiệm và ôn tập tạo bởi <b>Lữ Chí Vỹ</b></p>
        
        <div class="dashboard">
            <div class="progress-header">
                <span class="progress-title"><i class="fa-solid fa-chart-line"></i> Tiến độ hoàn thành</span>
                <span class="progress-stat" id="progressPercent">0%</span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="number" id="searchInput" class="search-input" placeholder="Tìm nhanh đến câu hỏi số (VD: 45)...">
            </div>
        </div>
    </header>

    <main class="gallery-container" id="galleryContainer"></main>

    <div class="modal" id="imageModal">
        <button class="btn-close" id="btnClose"><i class="fa-solid fa-xmark"></i></button>
        
        <div class="modal-content" id="swipeArea">
            <button class="modal-btn btn-prev" id="btnPrev"><i class="fa-solid fa-chevron-left"></i></button>
            <img id="modalImg" class="modal-img" src="" alt="Câu hỏi ôn tập">
            <button class="modal-btn btn-next" id="btnNext"><i class="fa-solid fa-chevron-right"></i></button>
        </div>
        
        <div class="modal-footer">
            <div class="modal-counter" id="modalCounter">Câu 1 / 291</div>
            
            <div class="normal-mode-controls" id="normalModeControls">
                <button class="btn-mark" id="btnMarkLearned">
                    <i class="fa-solid fa-check"></i> <span>Đánh dấu đã hiểu</span>
                </button>
            </div>

            <div class="quiz-mode-controls" id="quizModeControls">
                <button class="btn-option" data-opt="A">A</button>
                <button class="btn-option" data-opt="B">B</button>
                <button class="btn-option" data-opt="C">C</button>
                <button class="btn-option" data-opt="D">D</button>
                <button class="btn-submit" id="btnSubmitExam"><i class="fa-solid fa-paper-plane"></i> Nộp Bài</button>
            </div>
        </div>
    </div>

<script>
    // --- TỪ ĐIỂN ĐÁP ÁN (BẠN ĐIỀN VÀO ĐÂY NHÉ) ---
    const QUIZ_ANSWERS = {
        1: 'A', 2: 'C', 3: 'B', 4: 'D', 5: 'A'
        // Cập nhật thêm cho đến 291 nhé
    };

    // --- YOUTUBE API ---
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('youtubePlayer', {
            height: '0', width: '0', videoId: 'inn2yGLK_So', 
            playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'inn2yGLK_So' },
            events: { 'onReady': () => { player.setVolume(30); } }
        });
    }

    let isPlaying = false;
    document.getElementById('btnMusic').addEventListener('click', function() {
        if (!player || typeof player.playVideo !== 'function') { alert("Đang tải nhạc, chờ chút xíu nhé!"); return; }
        if (isPlaying) {
            player.pauseVideo();
            this.innerHTML = '<i class="fa-solid fa-music"></i> <span>Lo-Fi: TẮT</span>';
            this.classList.remove('playing');
        } else {
            player.playVideo();
            this.innerHTML = '<i class="fa-solid fa-headphones"></i> <span>Đang Chill...</span>';
            this.classList.add('playing');
        }
        isPlaying = !isPlaying;
    });

    // --- LOGIC HỆ THỐNG ---
    document.addEventListener('DOMContentLoaded', () => {
        const TOTAL_IMAGES = 285; 
        const STORAGE_KEY = 'dbi202_vip_items'; 
        const gallery = document.getElementById('galleryContainer');
        const searchInput = document.getElementById('searchInput');
        let learnedItems = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY)) || []);

        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');
        const modalCounter = document.getElementById('modalCounter');
        
        // Mode Flags
        let currentIndex = 1;
        let isQuizMode = false;
        
        // Exam Mode State
        let isExamMode = false;
        let examSequence = [];
        let currentExamStep = 0; // Từ 0 đến 49
        let userExamAnswers = {}; // Lưu đáp án User chọn

        const btnToggleQuiz = document.getElementById('btnToggleQuiz');
        const btnExamMode = document.getElementById('btnExamMode');
        const normalModeControls = document.getElementById('normalModeControls');
        const quizModeControls = document.getElementById('quizModeControls');
        const btnSubmitExam = document.getElementById('btnSubmitExam');

        // --- TÍNH NĂNG THI THỬ (MOCK TEST) ---
        function startExam() {
            // Lấy 50 câu random
            let arr = Array.from({length: TOTAL_IMAGES}, (_, i) => i + 1);
            arr.sort(() => Math.random() - 0.5);
            examSequence = arr.slice(0, 50);
            
            isExamMode = true;
            currentExamStep = 0;
            userExamAnswers = {};
            
            // Ép bật mode che đáp án
            document.body.classList.add('quiz-mode-active');
            isQuizMode = true; // Vô hiệu hóa tính năng lật đáp án
            
            btnSubmitExam.style.display = 'block'; // Hiện nút nộp bài
            
            openModal(examSequence[currentExamStep]);
        }

        btnExamMode.addEventListener('click', () => {
            if(confirm("Hệ thống sẽ trộn ngẫu nhiên 50 câu. Bạn đã sẵn sàng thi chưa?")) {
                startExam();
            }
        });

        btnSubmitExam.addEventListener('click', () => {
            let score = 0;
            let answeredCount = Object.keys(userExamAnswers).length;
            
            if(answeredCount < 50) {
                if(!confirm(`Bạn mới làm ${answeredCount}/50 câu. Có chắc chắn muốn nộp bài sớm không?`)) return;
            }

            // Chấm điểm
            for (let i = 0; i < examSequence.length; i++) {
                let qIndex = examSequence[i];
                let userAns = userExamAnswers[qIndex];
                let correctAns = QUIZ_ANSWERS[qIndex];
                
                if (userAns && correctAns && userAns === correctAns) {
                    score++;
                }
            }

            // Hiển thị kết quả
            const finalPoint = ((score / 50) * 10).toFixed(1); // Thang điểm 10
            document.getElementById('scoreText').innerText = `${score}/50`;
            document.getElementById('pointText').innerText = `Điểm: ${finalPoint}`;
            document.getElementById('resultOverlay').style.display = 'flex';
        });

        document.getElementById('btnCloseResult').addEventListener('click', () => {
            document.getElementById('resultOverlay').style.display = 'none';
            closeModal();
            startExam(); // Làm đề mới
        });

        document.getElementById('btnExitResult').addEventListener('click', () => {
            document.getElementById('resultOverlay').style.display = 'none';
            closeModal();
            exitExamMode();
        });

        function exitExamMode() {
            isExamMode = false;
            btnSubmitExam.style.display = 'none';
            document.body.classList.remove('quiz-mode-active');
            btnToggleQuiz.innerHTML = '<i class="fa-solid fa-gamepad"></i> <span>Luyện Thi: TẮT</span>';
            btnToggleQuiz.classList.remove('active');
            isQuizMode = false;
        }


        // --- BẬT / TẮT LUYỆN THI (QUIZ BÌNH THƯỜNG) ---
        btnToggleQuiz.addEventListener('click', () => {
            if(isExamMode) {
                alert("Bạn đang trong chế độ Thi Thử. Hãy Nộp bài hoặc Thoát trước khi chuyển mode nhé!");
                return;
            }

            isQuizMode = !isQuizMode;
            document.body.classList.toggle('quiz-mode-active', isQuizMode);
            
            if (isQuizMode) {
                btnToggleQuiz.classList.add('active');
                btnToggleQuiz.innerHTML = '<i class="fa-solid fa-gamepad"></i> <span>Luyện Thi: BẬT</span>';
                normalModeControls.style.display = 'none';
                quizModeControls.style.display = 'flex';
                resetQuizButtons();
            } else {
                btnToggleQuiz.classList.remove('active');
                btnToggleQuiz.innerHTML = '<i class="fa-solid fa-gamepad"></i> <span>Luyện Thi: TẮT</span>';
                normalModeControls.style.display = 'flex';
                quizModeControls.style.display = 'none';
            }
        });

        // --- XỬ LÝ KHI CHỌN ĐÁP ÁN (A B C D) ---
        document.querySelectorAll('.btn-option').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const selectedOpt = e.target.dataset.opt;

                if (isExamMode) {
                    // Chế độ thi thật: Chỉ lưu đáp án, tô màu nút đang chọn, KHÔNG BÁO ĐÚNG SAI
                    userExamAnswers[currentIndex] = selectedOpt;
                    resetQuizButtons();
                    e.target.classList.add('selected');
                } else {
                    // Chế độ Luyện Thi bình thường: Báo đúng sai ngay
                    const correctOpt = QUIZ_ANSWERS[currentIndex];
                    if (!correctOpt) {
                        alert(`Câu ${currentIndex} chưa có đáp án trong hệ thống!`);
                        return;
                    }

                    resetQuizButtons();

                    if (selectedOpt === correctOpt) {
                        e.target.classList.add('correct');
                        if (!learnedItems.has(currentIndex)) {
                            learnedItems.add(currentIndex);
                            localStorage.setItem(STORAGE_KEY, JSON.stringify([...learnedItems]));
                            updateProgress();
                            document.querySelector(`.img-card[data-index="${currentIndex}"]`).classList.add('learned');
                            document.querySelector(`.img-card[data-index="${currentIndex}"] .status-badge`).innerHTML = '<i class="fa-solid fa-check-circle"></i> Đã học';
                        }
                    } else {
                        e.target.classList.add('wrong');
                        document.querySelector(`.btn-option[data-opt="${correctOpt}"]`).classList.add('correct');
                    }
                }
            });
        });

        function resetQuizButtons() {
            document.querySelectorAll('.btn-option').forEach(b => b.classList.remove('correct', 'wrong', 'selected'));
        }

        // --- GIAO DIỆN LƯỚI ẢNH ---
        function updateProgress() {
            const count = learnedItems.size;
            const percent = ((count / TOTAL_IMAGES) * 100).toFixed(1);
            document.getElementById('progressPercent').textContent = `${count}/${TOTAL_IMAGES} (${percent}%)`;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        const fragment = document.createDocumentFragment();
        for (let i = 1; i <= TOTAL_IMAGES; i++) {
            const card = document.createElement('div');
            card.className = `img-card ${learnedItems.has(i) ? 'learned' : ''}`;
            card.dataset.index = i;
            card.style.animationDelay = `${(i % 15) * 0.05}s`;
            
            card.innerHTML = `
                <div class="img-wrapper">
                    <div class="learned-overlay"><i class="fa-solid fa-check"></i></div>
                    <img src="img-dbi/dbi (${i}).png" loading="lazy" onload="this.classList.add('loaded')" onerror="this.src='https://placehold.co/600x400/1a1a24/94a3b8?text=Chua+co+anh+${i}'" alt="Câu ${i}">
                </div>
                <div class="img-info">
                    <span class="img-title">Câu ${i}</span>
                    <span class="status-badge">
                        ${learnedItems.has(i) ? '<i class="fa-solid fa-check-circle"></i> Đã học' : '<i class="fa-regular fa-circle"></i> Chưa học'}
                    </span>
                </div>
            `;
            card.addEventListener('click', () => {
                if(isExamMode) {
                    alert("Bạn đang trong quá trình Thi Thử, không thể chọn câu hỏi tự do!");
                    return;
                }
                openModal(i);
            });
            fragment.appendChild(card);
        }
        gallery.appendChild(fragment);
        updateProgress();

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.trim();
            document.querySelectorAll('.img-card').forEach(card => {
                const isMatch = val === '' || card.dataset.index.includes(val);
                card.style.display = isMatch ? 'flex' : 'none';
            });
        });

        // --- ĐIỀU KHIỂN MODAL XEM ẢNH ---
        document.getElementById('btnMarkLearned').addEventListener('click', (e) => {
            e.stopPropagation();
            const card = document.querySelector(`.img-card[data-index="${currentIndex}"]`);
            const badge = card.querySelector('.status-badge');

            if (learnedItems.has(currentIndex)) {
                learnedItems.delete(currentIndex);
                card.classList.remove('learned');
                badge.innerHTML = '<i class="fa-regular fa-circle"></i> Chưa học';
            } else {
                learnedItems.add(currentIndex);
                card.classList.add('learned');
                badge.innerHTML = '<i class="fa-solid fa-check-circle"></i> Đã học';
            }
            localStorage.setItem(STORAGE_KEY, JSON.stringify([...learnedItems]));
            updateModalView();
            updateProgress();
        });

        function openModal(index) { 
            currentIndex = index; 
            updateModalView(); 
            modal.classList.add('active'); 
            document.body.style.overflow = 'hidden'; 
        }
        
        function closeModal() { 
            if(isExamMode) {
                if(!confirm("Bạn đang làm bài Thi Thử. Thoát bây giờ sẽ mất toàn bộ kết quả. Có chắc chắn thoát?")) return;
                exitExamMode();
            }
            modal.classList.remove('active'); 
            document.body.style.overflow = 'auto'; 
            setTimeout(() => modalImg.src = '', 300); 
        }
        
        function updateModalView() { 
            modalImg.src = `img-dbi/dbi (${currentIndex}).png`; 
            
            if (isExamMode) {
                modalCounter.textContent = `Câu ${currentExamStep + 1} / 50 (Gốc: ${currentIndex})`;
                normalModeControls.style.display = 'none';
                quizModeControls.style.display = 'flex';
                resetQuizButtons();
                // Phục hồi lại lựa chọn cũ nếu User back lại câu trước
                if(userExamAnswers[currentIndex]) {
                    document.querySelector(`.btn-option[data-opt="${userExamAnswers[currentIndex]}"]`).classList.add('selected');
                }
            } else {
                modalCounter.textContent = `Câu ${currentIndex} / ${TOTAL_IMAGES}`; 
                
                if (learnedItems.has(currentIndex)) {
                    document.getElementById('btnMarkLearned').classList.add('active');
                    document.getElementById('btnMarkLearned').innerHTML = `<i class="fa-solid fa-check-double"></i> <span>Đã hoàn thành</span>`;
                } else {
                    document.getElementById('btnMarkLearned').classList.remove('active');
                    document.getElementById('btnMarkLearned').innerHTML = `<i class="fa-solid fa-check"></i> <span>Đánh dấu đã hiểu</span>`;
                }
                resetQuizButtons();
            }
        }

        function prevImage() { 
            if (isExamMode) {
                if (currentExamStep > 0) { currentExamStep--; currentIndex = examSequence[currentExamStep]; updateModalView(); }
            } else {
                currentIndex = currentIndex > 1 ? currentIndex - 1 : TOTAL_IMAGES; updateModalView(); 
            }
        }
        function nextImage() { 
            if (isExamMode) {
                if (currentExamStep < 49) { currentExamStep++; currentIndex = examSequence[currentExamStep]; updateModalView(); }
            } else {
                currentIndex = currentIndex < TOTAL_IMAGES ? currentIndex + 1 : 1; updateModalView(); 
            }
        }

        document.getElementById('btnClose').addEventListener('click', closeModal);
        document.getElementById('btnPrev').addEventListener('click', (e) => { e.stopPropagation(); prevImage(); });
        document.getElementById('btnNext').addEventListener('click', (e) => { e.stopPropagation(); nextImage(); });
        
        document.addEventListener('keydown', (e) => {
            if (!modal.classList.contains('active')) return;
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'Escape') closeModal();
        });
    });
</script>
</body>
</html>
