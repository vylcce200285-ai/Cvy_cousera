<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Source(Free) PRO192 - Lữ Chí Vỹ</title>
    <style>
        body {
            margin: 0; padding: 40px 20px; text-align: center; color: white; min-height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #4158D0;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(339,49%,30%,1) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(253,16%,7%,1) 0, transparent 50%);
            background-attachment: fixed; background-size: 200% 200%;
            animation: meshAnimation 15s ease infinite; overflow-x: hidden;
        }

        .back-home {
            position: fixed; top: 20px; left: 20px; z-index: 1000; padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            color: white; text-decoration: none; font-weight: 700; font-size: 14px;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
        }
        .back-home:hover { transform: translateX(5px); background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 20px rgba(79, 172, 254, 0.4); }

        .super-title {
            display: inline-block; font-size: clamp(28px, 8vw, 60px); font-weight: 900;
            text-transform: uppercase; background: linear-gradient(90deg, #00f2fe, #4facfe, #f093fb, #f5576c);
            background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: textShine 4s linear infinite, floatText 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(79, 172, 254, 0.5)); margin-bottom: 5px;
        }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 35px; max-width: 1400px; margin: 0 auto; }
        .img-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 24px;
            overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); cursor: zoom-in;
        }
        .img-card:hover { transform: translateY(-15px) scale(1.02); background: rgba(255, 255, 255, 0.1); border-color: rgba(255, 255, 255, 0.3); }
        .img-card img { width: 100%; height: 220px; object-fit: cover; transition: 0.5s; }
        .img-label { padding: 20px; background: rgba(255, 255, 255, 0.95); color: #1a1a1a; font-weight: 800; }

        #imageModal { display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.95); backdrop-filter: blur(15px); justify-content:center; align-items:center; }
        #modalImg { max-width: 90%; max-height: 85%; border-radius: 15px; border: 2px solid white; }
        .close-btn { position: absolute; top: 30px; right: 40px; color: white; font-size: 50px; cursor: pointer; }

        @keyframes meshAnimation { 0%, 100% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } }
        @keyframes textShine { to { background-position: 300% center; } }
        @keyframes floatText { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">⬅ Back Home</a>
    <div id="imageModal"><span class="close-btn" onclick="closeModal()">&times;</span><img id="modalImg" src=""></div>
    <h1 class="super-title">SOURCE FREE PRO192 🔥</h1>
    <p>Coded by <b>Lữ Chí Vỹ</b> • Chúc AE học tốt nhá 💯</p>
    <div class="gallery" id="imageGallery"></div>
<script>
    const totalImages = 197; 
    const gallery = document.getElementById('imageGallery');
    const modal = document.getElementById('imageModal'); 
    const modalImg = document.getElementById('modalImg');
    let currentIndex = 1;

    for (let i = 1; i <= totalImages; i++) {
        const card = document.createElement('div'); 
        card.className = 'img-card';
        card.innerHTML = `<img src="img-pro/pro (${i}).png" loading="lazy" onerror="this.src='https://placehold.co/400x300?text=Error'"><div class="img-label">PRO192 • Câu ${i}</div>`;
        card.onclick = () => openModal(i); 
        gallery.appendChild(card);
    }

    function openModal(index) { 
        currentIndex = index; 
        modal.style.display = "flex"; 
        updateModalImage(); 
    }

    function closeModal() { 
        modal.style.display = "none"; 
    }

    function updateModalImage() { 
        modalImg.src = `img-pro/pro (${currentIndex}).png`; 
    }

    document.addEventListener('keydown', (e) => {
        if (modal.style.display === "flex") {
            if (e.key === "ArrowRight") { 
                currentIndex = currentIndex < totalImages ? currentIndex + 1 : 1; 
                updateModalImage(); 
            }
            else if (e.key === "ArrowLeft") { 
                currentIndex = currentIndex > 1 ? currentIndex - 1 : totalImages; 
                updateModalImage(); 
            }
            else if (e.key === "Escape") closeModal();
        }
    });

    modal.onclick = (e) => {
        if (e.target === modal) closeModal();
    };
</script>
</body>
</html>
